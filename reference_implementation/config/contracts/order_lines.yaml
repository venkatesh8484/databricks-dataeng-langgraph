table: order_lines
source_file: raw_order_lines.csv
business_key: [line_reference]
description: >
  Order line items (Hull, Propulsion, Electronics, Deck Equipment, Outfitting, Trials,
  Transfer). Finer grain than orders. Multi-currency price with fx_rate to EUR;
  cost is always in EUR already (cost_fx_rate == 1.0). Monetary columns are EUR thousands.

schema:
  required_columns:
    - raw_line_id
    - raw_order_id
    - external_order_id
    - line_type
    - line_reference
    - external_subcontractor_id
    - start_date
    - end_date
    - duration_days
    - price
    - cost
    - price_currency
    - cost_currency
    - price_fx_rate
    - cost_fx_rate
    - status
    - load_ts
    - source_file
  types:
    raw_line_id: int
    price: double
    cost: double
    price_fx_rate: double
    cost_fx_rate: double
    duration_days: int

rules:
  not_null:
    severity: hard
    max_fail_rate: 0.0
    columns: [raw_line_id, external_order_id, line_type, line_reference, external_subcontractor_id, price, cost, price_currency, cost_currency, price_fx_rate, cost_fx_rate, status]

  not_null_conditional:
    severity: soft
    max_fail_rate: 0.0
    # external_vessel_id (vessel FK) is only required on the primary 'Hull' line
    checks:
      - column: external_vessel_id
        when: "line_type = 'Hull'"

  unique:
    severity: hard
    max_fail_rate: 0.0
    columns: [raw_line_id, line_reference]

  allowed_values:
    severity: soft
    max_fail_rate: 0.01
    checks:
      line_type: ["Hull", "Propulsion", "Electronics", "Deck Equipment", "Outfitting", "Trials", "Transfer"]
      status: ["Ordered", "In Production", "Delivered", "Cancelled"]
      price_currency: ["EUR", "GBP", "USD"]
      cost_currency: ["EUR"]

  range:
    severity: soft
    max_fail_rate: 0.01
    checks:
      price: {min: 0, max: 100000}
      cost: {min: 0, max: 100000}
      price_fx_rate: {min: 0.5, max: 1.5}
      cost_fx_rate: {min: 0.99, max: 1.01}
      duration_days: {min: 0, max: 60}

  consistency:
    severity: soft
    max_fail_rate: 0.02
    checks:
      - name: end_date_not_before_start_date
        expression: "end_date >= start_date"
      - name: cancelled_ts_implies_status_cancelled
        expression: "(cancelled_ts IS NULL) OR (status = 'Cancelled')"

  referential_integrity:
    severity: hard
    max_fail_rate: 0.0
    checks:
      - column: external_order_id
        parent_table: orders
        parent_column: external_order_id
      - column: external_subcontractor_id
        parent_table: subcontractors
        parent_column: external_subcontractor_id
      - column: external_vessel_id
        parent_table: vessels
        parent_column: external_vessel_id
        nullable: true   # non-vessel line types legitimately have no vessel link

  freshness:
    severity: soft
    column: load_ts
    max_age_days: 400
