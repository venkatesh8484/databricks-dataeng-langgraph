# Streamlit native theme — matched to the app's "Ledger" light design system
# (single #0F62FE accent on neutral surfaces; see dashboard.py CSS tokens).
[theme]
primaryColor = "#0F62FE"
backgroundColor = "#F7F8FA"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"

[server]
enableXsrfProtection = true
