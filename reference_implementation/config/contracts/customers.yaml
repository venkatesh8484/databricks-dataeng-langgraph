table: customers
source_file: raw_customers.csv
business_key: [external_customer_id]
description: >
  Customer master data (buyer / fleet-operator contacts) from 3 source systems (SAP-ERP, Teamcenter, IFS-Apps).

schema:
  required_columns:
    - raw_customer_id
    - source_system
    - external_customer_id
    - customer_ref
    - email
    - title
    - forename
    - surname
    - country
    - marketing_optin
    - load_ts
    - source_file
  types:
    raw_customer_id: int
    external_customer_id: string
    email: string
    marketing_optin: string
    load_ts: timestamp

rules:
  not_null:
    severity: hard   # hard = quarantine + halt promotion if breach rate exceeds threshold
    max_fail_rate: 0.0
    columns: [raw_customer_id, external_customer_id, email, forename, surname, country]

  unique:
    severity: hard
    max_fail_rate: 0.0
    columns: [raw_customer_id, external_customer_id]

  allowed_values:
    severity: soft   # soft = quarantine offending rows, promotion continues
    max_fail_rate: 0.02
    checks:
      marketing_optin: ["Y", "N"]
      title: ["Mr", "Mrs", "Ms", "Capt", "Cdr"]

  regex:
    severity: soft
    max_fail_rate: 0.02
    checks:
      email: '^[^@\s]+@[^@\s]+\.[^@\s]+$'

  referential_integrity: []   # customers is a root entity, no parent FK to check

  freshness:
    severity: soft
    column: load_ts
    max_age_days: 730   # generous for a historical/batch dataset; tighten for live feeds

notes:
  - "address2 is legitimately null ~49% of the time (apartment/unit line) — not a quality issue."
