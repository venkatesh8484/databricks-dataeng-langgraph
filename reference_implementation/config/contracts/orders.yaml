table: orders
source_file: raw_orders.csv
business_key: [external_order_id]
description: >
  Vessel order header. Grain = one row per order. Monetary columns are EUR thousands.
  Assumed EUR (see FX policy in data_model/data_dictionary.md) since no currency column
  present at this grain. build_start/end = build start / delivery date.

schema:
  required_columns:
    - raw_order_id
    - source_system
    - external_order_id
    - order_reference
    - external_buyer_id
    - external_vessel_id
    - created_ts
    - confirmed_ts
    - build_start
    - build_end
    - total_price
    - total_cost
    - crew_officers
    - is_owner_order
    - sales_channel
    - channel_group
    - load_ts
    - source_file
  types:
    raw_order_id: int
    external_order_id: string
    total_price: double
    total_cost: double
    created_ts: timestamp

rules:
  not_null:
    severity: hard
    max_fail_rate: 0.0
    columns: [raw_order_id, external_order_id, external_buyer_id, external_vessel_id, created_ts, total_price, total_cost, sales_channel]

  unique:
    severity: hard
    max_fail_rate: 0.0
    columns: [raw_order_id, external_order_id, order_reference]

  allowed_values:
    severity: soft
    max_fail_rate: 0.01
    checks:
      is_owner_order: ["Y", "N"]
      sales_channel: ["Direct Tender", "Government Contract", "Framework Agreement", "Broker", "Repeat Order", "Export Credit"]
      channel_group: ["Direct", "Indirect", "Government"]

  range:
    severity: soft
    max_fail_rate: 0.01
    checks:
      total_price: {min: 0, max: 200000}
      total_cost: {min: 0, max: 200000}
      crew_officers: {min: 1, max: 20}
      crew_ratings: {min: 0, max: 10}
      crew_cadets: {min: 0, max: 10}

  consistency:
    severity: soft
    max_fail_rate: 0.02
    checks:
      - name: cancelled_ts_implies_reason
        expression: "(cancelled_ts IS NULL AND cancellation_reason IS NULL) OR (cancelled_ts IS NOT NULL AND cancellation_reason IS NOT NULL)"
      - name: vessel_dates_ordered
        expression: "build_end >= build_start"
      - name: cost_not_greater_than_price
        expression: "total_cost <= total_price * 1.5"   # soft sanity guard, not a hard margin rule

  referential_integrity:
    severity: hard
    max_fail_rate: 0.0
    checks:
      - column: external_buyer_id
        parent_table: buyers
        parent_column: external_buyer_id
      - column: external_vessel_id
        parent_table: vessels
        parent_column: external_vessel_id

  freshness:
    severity: soft
    column: load_ts
    max_age_days: 400
